<style>
  :root {
    --paper:        oklch(0.987 0.004 150);
    --paper-2:      oklch(0.972 0.006 150);
    --surface:      oklch(1 0 0);
    --surface-2:    oklch(0.985 0.004 150);
    --ink:          oklch(0.27 0.022 165);
    --ink-2:        oklch(0.45 0.020 165);
    --ink-3:        oklch(0.60 0.016 165);

    --clay-soft:    oklch(0.95 0.060 90);

    --good-soft:    oklch(0.92 0.052 160);
    --warn:         oklch(0.62 0.190 30);

    --bad:          oklch(0.52 0.210 28);

    --shadow-md: 0 4px 14px oklch(0.4 0.03 60 / 0.10), 0 1px 3px oklch(0.4 0.03 60 / 0.08);
    --shadow-lg: 0 18px 50px oklch(0.35 0.03 60 / 0.18), 0 4px 12px oklch(0.4 0.03 60 / 0.10);
    --r-sm: 10px; --r-md: 16px; --r-lg: 24px;
    --font-display: 'Bricolage Grotesque', system-ui, sans-serif;
    --font-body:    'Hanken Grotesk', system-ui, sans-serif;
    --font-mono:    'Spline Sans Mono', ui-monospace, monospace;
  }
  .theme-dusk {
    --paper:     oklch(0.30 0.020 65); --paper-2:   oklch(0.26 0.020 66);
    --surface:   oklch(0.35 0.020 64); --surface-2: oklch(0.32 0.020 64);
    --ink:       oklch(0.95 0.012 84); --ink-2:     oklch(0.82 0.016 80);
    --ink-3:     oklch(0.68 0.018 76); --line:      oklch(0.42 0.018 66);
    --line-2:    oklch(0.48 0.018 66); --leaf-soft: oklch(0.40 0.055 165);
    --clay-soft: oklch(0.44 0.060 88); --good-soft: oklch(0.40 0.060 162);
    --warn-soft: oklch(0.42 0.070 32); --bad-soft:  oklch(0.40 0.065 30);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: oklch(0.20 0.014 62); font-family: var(--font-body); color: var(--ink); -webkit-font-smoothing: antialiased; }
  #viewport { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; background: radial-gradient(120% 90% at 50% -10%, oklch(0.28 0.018 70), oklch(0.18 0.012 60)); }
  #scaler { width: 1194px; height: 834px; transform-origin: center center; flex: none; }
  .tablet { width: 100%; height: 100%; background: oklch(0.16 0.010 60); border-radius: 34px; padding: 16px; box-shadow: var(--shadow-lg), inset 0 0 0 2px oklch(0.32 0.012 66); position: relative; }
  .tablet::after { content: ""; position: absolute; top: 50%; right: 7px; width: 7px; height: 7px; border-radius: 50%; background: oklch(0.30 0.02 240); transform: translateY(-50%); box-shadow: inset 0 0 0 1.5px oklch(0.10 0.01 60); }
  .screen { width: 100%; height: 100%; border-radius: 22px; overflow: hidden; background: var(--paper); position: relative; display: flex; flex-direction: column; }
  #root { width: 100%; height: 100%; }
  ::selection { background: var(--leaf-soft); }
  @keyframes riseIn    { from { transform: translateY(16px); } to { transform: none; } }
  @keyframes fadeIn    { from { transform: translateY(8px);  } to { transform: none; } }
  @keyframes popIn     { from { transform: scale(0.96);      } to { transform: none; } }
  @keyframes needleSwing { from { transform: rotate(-12deg); } to { transform: none; } }
  @keyframes blink     { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
  .loading-frame { position: fixed; inset: 0; display: grid; place-items: center; background: oklch(0.20 0.014 62); color: oklch(0.8 0.02 80); font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.04em; z-index: 50; }
</style>

 * by dragging an image file onto it (or clicking to browse). The dropped
 * image persists across reloads via a .image-slots.state.json sidecar —
 * same read-via-fetch / write-via-window.omelette pattern as
 * design_canvas.jsx, so the filled slot shows on share links, downloaded
 * zips, and PPTX export. Outside the omelette runtime the slot is read-only.
 *
 * The host bridge only allows sidecar writes at the project root, so the
 * HTML that uses this component is assumed to live at the project root too
 * (same constraint as design_canvas.jsx).
 *
 * Attributes:
 *   id           Persistence key. REQUIRED for the drop to survive reload —
 *                every slot on the page needs a distinct id.
 *   shape        'rect' | 'rounded' | 'circle' | 'pill'   (default 'rounded')
 *                'circle' applies 50% border-radius; on a non-square slot
 *                that's an ellipse — set equal width and height for a true
 *                circle.
 *   radius       Corner radius in px for 'rounded'.       (default 12)
 *   mask         Any CSS clip-path value. Overrides `shape` — use this for
 *                hexagons, blobs, arbitrary polygons.
 *   fit          object-fit: cover | contain | fill.       (default 'cover')
 *                With cover (the default) double-clicking the filled slot
 *                enters a reframe mode: the whole image spills past the mask
 *                (translucent outside, opaque inside), drag to reposition,
 *                corner-drag to scale. The crop persists alongside the image
 *                in the sidecar. contain/fill stay static.
 *   position     object-position for fit=contain|fill.     (default '50% 50%')
 *   placeholder  Empty-state caption.                      (default 'Drop an image')
 *   src          Optional initial/fallback image URL. A user drop overrides
 *                it; clearing the drop reveals src again.
 *
 * Size and layout come from ordinary CSS on the element — width/height
 * inline or from a parent grid — so it composes with any layout.
 *
 * Usage:
 *   <image-slot id="hero"   style="width:800px;height:450px" shape="rounded" radius="20"
 *               placeholder="Drop a hero image"></image-slot>
 *   <image-slot id="avatar" style="width:120px;height:120px" shape="circle"></image-slot>
 *   <image-slot id="kite"   style="width:300px;height:300px"
 *               mask="polygon(50% 0, 100% 50%, 50% 100%, 0 50%)"></image-slot>
 */
/* END USAGE */

(() => {
  const STATE_FILE = '.image-slots.state.json';
  // 2× a ~600px slot in a 1920-wide deck — retina-sharp without making the
  // sidecar enormous. A 1200px WebP at q=0.85 is ~150-300KB.
  const MAX_DIM = 1200;
  // Raster formats only. SVG is excluded (can carry script; createImageBitmap
  // on SVG blobs is inconsistent). GIF is excluded because the canvas
  // re-encode keeps only the first frame, so an animated GIF would silently
  // go still — better to reject than surprise.
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  // ── Shared sidecar store ────────────────────────────────────────────────
  // One fetch + immediate write-on-change for every <image-slot> on the
  // page. Reads via fetch() so viewing works anywhere the HTML and sidecar
  // are served together; writes go through window.omelette.writeFile, which
  // the host allowlists to *.state.json basenames only.
  const subs = new Set();
  let slots = {};
  // ids explicitly cleared before the sidecar fetch resolved — otherwise
  // the merge below can't tell "never set" from "just deleted" and would
  // resurrect the sidecar's stale value.
  const tombstones = new Set();
  let loaded = false;
  let loadP = null;

  function load() {
    if (loadP) return loadP;
    loadP = fetch(STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        // Merge: sidecar loses to any in-memory change that raced ahead of
        // the fetch (drop or clear) so neither is clobbered by hydration.
        if (j && typeof j === 'object') {
          const merged = Object.assign({}, j, slots);
          // A framing-only write that raced ahead of hydration must not
          // drop a user image that's only on disk — inherit u from the
          // sidecar for any in-memory entry that lacks one.
          for (const k in slots) {
            if (merged[k] && !merged[k].u && j[k]) {
              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;
            }
          }
          for (const id of tombstones) delete merged[id];
          slots = merged;
        }
        tombstones.clear();
      })
      .catch(() => {})
      .then(() => { loaded = true; subs.forEach((fn) => fn()); });
    return loadP;
  }

  // Serialize writes so two near-simultaneous drops on different slots
  // can't reorder at the backend and leave the sidecar with only the
  // first. A save requested mid-flight just marks dirty and re-fires on
  // completion with the then-current slots.
  let saving = false;
  let saveDirty = false;
  function save() {
    if (saving) { saveDirty = true; return; }
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    saving = true;
    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))
      .catch(() => {})
      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  // Normalize a stored slot value. Pre-reframe sidecars stored a bare
  // data-URL string; newer ones store {u, s, x, y}. Either shape is valid.
  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }

  function setSlot(id, val) {
    if (!id) return;
    if (val) { slots[id] = val; tombstones.delete(id); }
    else { delete slots[id]; if (!loaded) tombstones.add(id); }
    subs.forEach((fn) => fn());
    // A drop is rare + high-value — write immediately so nav-away can't lose
    // it. Gate on the initial read so we don't overwrite a sidecar we haven't
    // merged yet; the merge in load() keeps this change once the read lands.
    if (loaded) save(); else load().then(save);
  }

  // ── Image downscale ─────────────────────────────────────────────────────
  // Encode through a canvas so the sidecar carries resized bytes, not the
  // raw upload. Longest side is capped at 2× the slot's rendered width
  // (retina) and at MAX_DIM. WebP keeps alpha and is ~10× smaller than PNG
  // for photos, so there's no need for per-image format picking.
  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally {
      bitmap.close && bitmap.close();
    }
  }

  // ── Custom element ──────────────────────────────────────────────────────
  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +
    // .frame img (clipped) and .spill (unclipped ghost + handles) share the
    // same left/top/width/height in frame-%, computed by _applyView(), so the
    // inside-mask crop and the outside-mask spill stay pixel-aligned.
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    // Reframe mode (double-click): the full image spills past the mask. The
    // spill layer is sized to the IMAGE bounds so its corners are where the
    // resize handles belong. The ghost <img> inside is translucent; the real
    // clipped <img> underneath shows the opaque in-mask crop.
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;' +
    '  cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;' +
    '  pointer-events:none;-webkit-user-drag:none;user-select:none;' +
    '  box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;' +
    '  background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);' +
    '  transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' +
    '  justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;' +
    '  cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.45}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em}' +
    '.empty .sub{font-size:11px}' +
    '.empty .sub u{text-underline-offset:2px;text-decoration-color:rgba(0,0,0,.25)}' +
    '.empty:hover .sub u{color:rgba(0,0,0,.75);text-decoration-color:currentColor}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;' +
    '  background:rgba(201,100,66,.10)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(0,0,0,.25);' +
    '  transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    // Controls sit BELOW the mask (top:100%), absolutely positioned so the
    // author-declared slot height is unaffected. The gap is padding, not a
    // top offset, so the hover target stays contiguous with the frame.
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;' +
    '  display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;' +
    '  white-space:nowrap}' +
    ':host([data-filled][data-editable]:hover) .ctl,:host([data-reframe]) .ctl' +
    '  {opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;' +
    '  background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;' +
    '  backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;' +
    '  background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

  const icon =
    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>';

  class ImageSlot extends HTMLElement {
    static get observedAttributes() {
      return ['shape', 'radius', 'mask', 'fit', 'position', 'placeholder', 'src', 'id'];
    }

    constructor() {
      super();
      const root = this.attachShadow({ mode: 'open' });
      // .spill and .ctl sit OUTSIDE .frame so overflow:hidden + border-radius
      // on the frame (circle, pill, rounded) can't clip them.
      root.innerHTML =
        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace" title="Replace image">Replace</button>' +
        '  <button data-act="clear" title="Remove image">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0;
      this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      // Shadow-DOM listeners live with the shadow DOM — bound once here so
      // disconnect/reconnect (e.g. React remount) doesn't stack handlers.
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (act === 'replace') { this._exitReframe(true); this._input.click(); }
        if (act === 'clear') {
          this._exitReframe(false);
          this._gen++;
          this._local = null;
          if (this.id) setSlot(this.id, null); else this._render();
        }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);
        this._input.value = '';
      });
      // naturalWidth/Height aren't known until load — re-apply so the cover
      // baseline is computed from real dimensions, not the 100%×100% fallback.
      this._img.addEventListener('load', () => this._applyView());
      // Gated on editable + fit=cover so share links and contain/fill slots
      // stay static.
      this.addEventListener('dblclick', (e) => {
        if (!this.hasAttribute('data-editable') || !this._reframes()) return;
        e.preventDefault();
        if (this.hasAttribute('data-reframe')) this._exitReframe(true);
        else this._enterReframe();
      });
      // Pan + resize both originate on the spill layer. A handle pointerdown
      // drives an aspect-locked resize anchored at the opposite corner; any
      // other pointerdown on the spill pans. Offsets are frame-% so a
      // reframed slot survives responsive resize / PPTX export.
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {
          // Resize about the OPPOSITE corner. Viewport-px throughout (rect
          // fw/fh, not clientWidth) so the math survives a transform:scale()
          // ancestor — deck_stage renders slides scaled-to-fit.
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1;
          const sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw;
          const cy0 = (50 + this._view.y) / 100 * fh;
          const ox = cx0 - sx * w0 / 2, oy = cy0 - sy * h0 / 2;
          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView();
            this._applyView();
          };
        } else {
          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;
            this._clampView();
            this._applyView();
          };
        }
        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);
          this._spill.removeEventListener('pointercancel', up);
          this.removeAttribute('data-panning');
          this._dragUp = null;
        };
        // Stashed so _exitReframe (Escape / outside-click mid-drag) can
        // tear the capture + listeners down synchronously.
        this._dragUp = up;
        this._spill.addEventListener('pointermove', move);
        this._spill.addEventListener('pointerup', up);
        this._spill.addEventListener('pointercancel', up);
      });
      // Wheel zoom stays available inside reframe mode as a trackpad nicety —
      // zooms toward the cursor (offset' = cursor·(1-k) + offset·k).
      this.addEventListener('wheel', (e) => {
        if (!this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        const r = this.getBoundingClientRect();
        const cx = (e.clientX - r.left) / r.width * 100 - 50;
        const cy = (e.clientY - r.top) / r.height * 100 - 50;
        const prev = this._view.s;
        const next = clampS(prev * Math.pow(1.0015, -e.deltaY));
        if (next === prev) return;
        const k = next / prev;
        this._view.s = next;
        this._view.x = cx * (1 - k) + this._view.x * k;
        this._view.y = cy * (1 - k) + this._view.y * k;
        this._clampView();
        this._applyView();
      }, { passive: false });
    }

    connectedCallback() {
      // Warn once per page — an id-less slot works for the session but
      // cannot persist, and two id-less slots would share nothing.
      if (!this.id && !ImageSlot._warned) {
        ImageSlot._warned = true;
        console.warn('<image-slot> without an id will not persist its dropped image.');
      }
      this.addEventListener('dragenter', this);
      this.addEventListener('dragover', this);
      this.addEventListener('dragleave', this);
      this.addEventListener('drop', this);
      subs.add(this._subFn);
      // width%/height% in _applyView encode the frame aspect at call time —
      // a host resize (responsive grid, pane divider) would stretch the
      // image until the next _render. Re-render on size change: _render()
      // re-seeds _view from stored before clamp/apply, so a shrink→grow
      // cycle round-trips instead of ratcheting x/y toward the narrower
      // frame's clamp range.
      this._ro = new ResizeObserver(() => this._render());
      this._ro.observe(this);
      load();
      this._render();
    }

    disconnectedCallback() {
      subs.delete(this._subFn);
      this.removeEventListener('dragenter', this);
      this.removeEventListener('dragover', this);
      this.removeEventListener('dragleave', this);
      this.removeEventListener('drop', this);
      if (this._ro) { this._ro.disconnect(); this._ro = null; }
      this._exitReframe(false);
    }

    _enterReframe() {
      if (this.hasAttribute('data-reframe')) return;
      this.setAttribute('data-reframe', '');
      this._applyView();
      // Close on click outside (the spill handler stopPropagation()s so
      // in-image drags don't reach this) and on Escape. Listeners are held
      // on the instance so _exitReframe / disconnectedCallback can detach
      // exactly what was attached.
      this._outside = (e) => {
        if (e.composedPath && e.composedPath().includes(this)) return;
        this._exitReframe(true);
      };
      this._esc = (e) => { if (e.key === 'Escape') this._exitReframe(true); };
      document.addEventListener('pointerdown', this._outside, true);
      document.addEventListener('keydown', this._esc, true);
    }

    _exitReframe(commit) {
      if (!this.hasAttribute('data-reframe')) return;
      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe');
      this.removeAttribute('data-panning');
      if (this._outside) document.removeEventListener('pointerdown', this._outside, true);
      if (this._esc) document.removeEventListener('keydown', this._esc, true);
      this._outside = this._esc = null;
      if (commit) this._commitView();
    }

    attributeChangedCallback() { if (this.shadowRoot) this._render(); }

    // handleEvent — one listener object for all four drag events keeps the
    // add/remove symmetric and the depth counter correct.
    handleEvent(e) {
      if (e.type === 'dragenter' || e.type === 'dragover') {
        // Without preventDefault the browser never fires 'drop'.
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
        if (e.type === 'dragenter') this._depth++;
        this.setAttribute('data-over', '');
      } else if (e.type === 'dragleave') {
        // dragenter/leave fire for every descendant crossing — count depth
        // so hovering the icon inside the empty state doesn't flicker.
        if (--this._depth <= 0) { this._depth = 0; this.removeAttribute('data-over'); }
      } else if (e.type === 'drop') {
        e.preventDefault();
        e.stopPropagation();
        this._depth = 0;
        this.removeAttribute('data-over');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) this._ingest(f);
      }
    }

    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) {
        this._setError('Drop a PNG, JPEG, WebP, or AVIF image.');
        return;
      }
      // toDataUrl can take hundreds of ms on a large photo. A Clear or a
      // newer drop during that window would be clobbered when this await
      // resumes — bump + capture a generation so stale encodes bail.
      const gen = ++this._gen;
      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        // Only exit reframe once the new image is in hand — a rejected type
        // or decode failure leaves the in-progress crop untouched.
        this._exitReframe(false);
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        // Keep a session-local copy for id-less slots so the drop still
        // shows, even though it cannot persist.
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) {
        if (gen !== this._gen) return;
        this._setError('Could not read that image.');
        console.warn('<image-slot> ingest failed:', err);
      }
    }

    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div');
      d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d);
      this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }

    // Reframing (pan/resize) is only meaningful for fit=cover — contain/fill
    // keep the old object-fit path and double-click is a no-op.
    _reframes() {
      return this.hasAttribute('data-filled') &&
        (this.getAttribute('fit') || 'cover') === 'cover';
    }

    // Cover-baseline geometry, shared by clamp/apply/resize. Null until the
    // img has loaded (naturalWidth is 0 before that) or when the slot has no
    // layout box — ResizeObserver fires with a 0×0 rect under display:none,
    // and clamping against a degenerate 1×1 frame would silently pull the
    // stored pan toward zero.
    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }

    _clampView() {
      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }

    _applyView() {
      const g = this._geom();
      const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        // Non-cover, or dimensions not known yet (before img load).
        this._img.style.width = '100%';
        this._img.style.height = '100%';
        this._img.style.left = '50%';
        this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%';
        return;
      }
      // Cover baseline: img fills the frame on its tighter axis at s=1, so
      // pan works immediately on the overflowing axis without zooming first.
      // Width/height and left/top are all frame-% — depends only on the
      // frame aspect ratio, so a responsive resize keeps the same crop. The
      // spill layer mirrors the same box so its corners = image corners.
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%';
      const h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%';
      const t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t;
      this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;
    }

    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      // Framing-only (no u) persists too so an author-src slot remembers its
      // crop; clearing the sidecar still falls through to src=.
      if (this.id) setSlot(this.id, v);
      else { this._local = v; }
    }

    _render() {
      // Shape / mask. Presets use border-radius so the dashed ring can
      // follow the rounded outline; clip-path is only applied for an
      // explicit `mask` (the ring is hidden there since a rectangle
      // dashed border chopped by an arbitrary polygon looks broken).
      const mask = this.getAttribute('mask');
      const shape = (this.getAttribute('shape') || 'rounded').toLowerCase();
      let radius = '';
      if (shape === 'circle') radius = '50%';
      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') {
        const n = parseFloat(this.getAttribute('radius'));
        radius = (Number.isFinite(n) ? n : 12) + 'px';
      }
      this._frame.style.borderRadius = mask ? '' : radius;
      this._frame.style.clipPath = mask || '';
      this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';

      // Controls and reframe entry gate on this so share links stay read-only.
      const editable = !!(window.omelette && window.omelette.writeFile);
      this.toggleAttribute('data-editable', editable);
      this._sub.style.display = editable ? '' : 'none';

      // Content. The sidecar is also writable by the agent's write_file
      // tool, so its value isn't guaranteed canvas-originated — only accept
      // data:image/ URLs from it. The `src` attribute is author-controlled
      // (Claude wrote it into the HTML) so it passes through unchanged.
      let stored = this.id ? getSlot(this.id) : this._local;
      if (stored && stored.u && !/^data:image\//i.test(stored.u)) stored = null;
      const srcAttr = this.getAttribute('src') || '';
      this._userUrl = (stored && stored.u) || null;
      const url = this._userUrl || srcAttr;
      // Don't clobber an in-flight reframe with a store-triggered re-render.
      if (!this.hasAttribute('data-reframe')) {
        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,
        };
      }
      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      // Toggle via style.display — the [hidden] attribute alone loses to
      // the display:flex / display:block rules in the stylesheet above.
      if (url) {
        if (this._img.getAttribute('src') !== url) {
          this._img.src = url;
          this._ghost.src = url;
        }
        this._img.style.display = 'block';
        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();
      } else {
        this._img.style.display = 'none';
        this._img.removeAttribute('src');
        this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex';
        this.removeAttribute('data-filled');
      }
    }
  }

  if (!customElements.get('image-slot')) {
    customElements.define('image-slot', ImageSlot);
  }
})();

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"

          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {

  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

/* Renders a count of bags as little glyphs (cap to avoid overflow) */
function BagRow({ count, color }) {
  const whole = Math.floor(count);
  const frac = count - whole;
  const show = Math.min(whole, 12);
  const arr = Array.from({ length: show });
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 3, alignItems: "center" }}>
      {arr.map((_, i) => <Bag key={i} color={color} size={20} />)}
      {frac > 0 && <span style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--ink-3)" }}>+½</span>}
      {whole > 12 && <span style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--ink-3)" }}>+{whole-12}</span>}
    </div>
  );
}

function Stepper({ steps, current }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 0 }}>
      {steps.map((s, i) => {
        const done = i < current, active = i === current;
        return (
          <React.Fragment key={s}>
            <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
              <div style={{
                width: 26, height: 26, borderRadius: 999, flex: "none",
                display: "grid", placeItems: "center",
                fontSize: 12.5, fontWeight: 700, fontFamily: "var(--font-mono)",
                background: done ? "var(--leaf)" : active ? "var(--surface)" : "transparent",
                color: done ? "var(--surface)" : active ? "var(--leaf-deep)" : "var(--ink-3)",
                border: active ? "2px solid var(--leaf)" : done ? "2px solid var(--leaf)" : "2px solid var(--line-2)",
                transition: "all .3s",
              }}>{done ? "✓" : i + 1}</div>
              <span style={{
                fontSize: 13.5, fontWeight: active ? 700 : 500,
                color: active ? "var(--ink)" : done ? "var(--ink-2)" : "var(--ink-3)",
                letterSpacing: "0.01em",
              }}>{s}</span>
            </div>
            {i < steps.length - 1 && (
              <div style={{ flex: 1, height: 2, minWidth: 22, margin: "0 14px",
                background: done ? "var(--leaf)" : "var(--line-2)", borderRadius: 2, transition: "background .3s" }} />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

function Btn({ children, onClick, variant = "primary", disabled, style, size = "md" }) {
  const pads = size === "lg" ? "16px 30px" : size === "sm" ? "9px 16px" : "13px 24px";
  const base = {
    fontFamily: "var(--font-body)", fontWeight: 700, fontSize: size === "lg" ? 17 : 15,
    padding: pads, borderRadius: 999, border: "none", cursor: disabled ? "not-allowed" : "pointer",
    display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 10,
    transition: "transform .12s, box-shadow .2s, background .2s, opacity .2s",
    opacity: disabled ? 0.4 : 1, letterSpacing: "0.005em",
  };
  const variants = {
    primary: { background: "var(--leaf)", color: "var(--surface)", boxShadow: "var(--shadow-sm)" },
    dark:    { background: "var(--ink)", color: "var(--paper)", boxShadow: "var(--shadow-sm)" },

    clay:    { background: "var(--clay)", color: "var(--surface)", boxShadow: "var(--shadow-sm)" },
  };
  const ref = useRef(null);
  return (
    <button ref={ref} onClick={disabled ? undefined : onClick} disabled={disabled}
      onMouseDown={(e) => !disabled && (e.currentTarget.style.transform = "scale(0.97)")}
      onMouseUp={(e) => (e.currentTarget.style.transform = "")}
      onMouseLeave={(e) => (e.currentTarget.style.transform = "")}
      style={{ ...base, ...variants[variant], ...style }}>
      {children}
    </button>
  );
}

                </div>
                <input
                type="number" inputMode="decimal" step="0.5" min="0.5" autoFocus
                value={acreStr}
                onChange={(e) => onAcreChange(e.target.value)}
                onKeyDown={(e) => {if (e.key === "Enter") commitAndContinue();}}
                style={{ flex: 1, minWidth: 0, border: "none", outline: "none", background: "transparent", fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 34, color: "var(--ink)", padding: "8px 0" }} />

              {/* actions */}

                  Back

                <Btn variant="primary" size="lg" onClick={commitAndContinue} style={{ flex: 1 }}>
                  Confirm {acreLabel(round1(parseFloat(acreStr) > 0 ? parseFloat(acreStr) : f.acres))} <Arrow />

}

/* ============================================================

const PRODUCT_DISPLAY = {

  lime: { name: "Lime", slot: "fert-photo-lime", ph: "Drop a lime product photo" },
  npk: { name: "NPK Fertilizer", slot: "fert-photo-npk", ph: "Drop an NPK product photo" }
};
const fmtKg = (kg) => (Number.isInteger(kg) ? kg : kg).toString();

/* One product card — photo, name, pack-size chips */

  const d = PRODUCT_DISPLAY[prod.key];

  return (
    <div style={{
      background: "var(--surface)", borderRadius: "var(--r-md)", overflow: "hidden",

    }}>
      {/* photo + name — tap to select */}
      <div onClick={() => flow.toggleProduct(prod.key)} style={{ cursor: "pointer", flex: 1, display: "flex", flexDirection: "column" }}>
        <div style={{ position: "relative", flex: 1, minHeight: 168 }}>
          {window.__FERT_IMAGES && window.__FERT_IMAGES[prod.key]

}
          <div style={{ position: "absolute", top: 12, right: 12, width: 28, height: 28, borderRadius: 999, flex: "none", display: "grid", placeItems: "center", background: on ? "var(--leaf)" : "color-mix(in oklch, white 70%, transparent)", border: on ? "none" : "2px solid var(--line-2)", boxShadow: "var(--shadow-sm)", transition: "all .2s" }}>

        <div style={{ background: "var(--surface)", padding: on ? "14px 18px 4px" : "14px 18px 16px", fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 21, color: "var(--ink)", lineHeight: 1.05 }}>{d.name}</div>

const stepBtn = { width: 24, height: 24, borderRadius: 999, border: "none", background: "var(--leaf)", color: "white", fontSize: 16, fontWeight: 700, lineHeight: 1, cursor: "pointer", display: "grid", placeItems: "center", flex: "none" };

const pillStep = { width: 34, height: 34, borderRadius: 999, border: "none", background: "var(--surface)", color: "var(--ink)", fontSize: 20, fontWeight: 600, lineHeight: 1, cursor: "pointer", display: "grid", placeItems: "center", flex: "none", boxShadow: "var(--shadow-sm)" };

  };
}
function Check() {
  return (
    <div style={{ position: "absolute", top: 14, right: 14, width: 24, height: 24, borderRadius: 999, background: "var(--leaf)", display: "grid", placeItems: "center", animation: "popIn .2s ease" }}>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 12l5 5L20 6" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" /></svg>

}

/* ============================================================
   Screen 5 — Digital Soil Analysis
   ============================================================ */
function ScreenSoilTest({ flow }) {
  const f = flow.farmer;
  const [done, setDone] = gUseState(false);
  const [line, setLine] = gUseState(0);
  const steps = ["Fetching local climate data…", "Cross-referencing soil map…", "Running ML acidity model…", "Compiling plot insight…"];
  gUseEffect(() => {
    setDone(false);setLine(0);
    const iv = setInterval(() => setLine((l) => {
      if (l >= steps.length - 1) {clearInterval(iv);setTimeout(() => setDone(true), 500);return l;}
      return l + 1;
    }), 600);
    return () => clearInterval(iv);
  }, [f.id]);
  const st = phStatus(f.ph);

  if (!done) {
    return (
      <div style={{ minHeight: "100%", display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", gap: 26 }}>
        <div style={{ position: "relative", width: 88, height: 88 }}>
          <div style={{ position: "absolute", inset: 0, borderRadius: 999, border: "4px solid var(--line)", borderTopColor: "var(--leaf)", animation: "spin 0.9s linear infinite" }} />
          <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", fontSize: 30 }}>🌱</div>
        </div>
        <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        <div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 22, color: "var(--ink)" }}>Analyzing {f.first}'s plot…</div>
        <div style={{ width: 420 }}>
          {steps.map((s, i) =>
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 0", opacity: i <= line ? 1 : 0.3, transition: "opacity .3s" }}>
              <span style={{ width: 18, height: 18, borderRadius: 999, display: "grid", placeItems: "center",
              background: i < line ? "var(--leaf)" : "transparent", border: i < line ? "none" : "2px solid var(--line-2)", flex: "none" }}>
                {i < line && <svg width="10" height="10" viewBox="0 0 24 24"><path d="M4 12l5 5L20 6" stroke="white" strokeWidth="3.5" fill="none" strokeLinecap="round" strokeLinejoin="round" /></svg>}
              </span>
              <span style={{ fontFamily: "var(--font-mono)", fontSize: 14, color: i === line ? "var(--ink)" : "var(--ink-2)" }}>{s}</span>
            </div>
          )}
        </div>
      </div>);

  }

  const toneWord = { good: "Good", warn: "Moderate", bad: "Needs attention", info: "Good" }[st.tone];
  return (
    <div style={{ display: "grid", gridTemplateColumns: "0.95fr 1.05fr", gap: 36, minHeight: "100%", alignItems: "center" }}>
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", animation: "popIn .5s ease both" }}>
        <PhGauge value={f.ph} projected={f.phLimed} size={380} showProjected />
        <div style={{ marginTop: -14, textAlign: "center" }}>
          <div style={{ fontFamily: "var(--font-display)", fontWeight: 800, fontSize: 60, color: `var(--${st.tone})`, lineHeight: 1 }}>{f.ph}</div>
          <div style={{ fontFamily: "var(--font-mono)", fontSize: 13, color: "var(--ink-3)", letterSpacing: "0.1em", marginTop: 2 }}>SOIL pH</div>
          <div style={{ marginTop: 12 }}><StatusBadge tone={st.tone} big>{st.label}</StatusBadge></div>
          <div style={{ marginTop: 12, fontSize: 13, color: "var(--ink-3)", display: "flex", alignItems: "center", gap: 6, justifyContent: "center" }}>
            <span style={{ width: 18, height: 0, borderTop: "2px dashed var(--good)" }} />
            After lime → pH {f.phLimed} (optimal)
          </div>
        </div>
      </div>

      <div style={{ animation: "riseIn .55s ease both" }}>
        {flow.hybrid ?
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
            <div style={{ width: 34, height: 34, borderRadius: 999, background: "var(--leaf-deep)", display: "grid", placeItems: "center", fontSize: 17 }}>🌿</div>
            <div style={{ fontWeight: 700, fontSize: 14, color: "var(--ink)" }}>FieldPro Bot<span style={{ fontWeight: 500, color: "var(--ink-3)", fontFamily: "var(--font-mono)", fontSize: 12, marginLeft: 8 }}>now</span></div>
          </div> :

        <div style={{ fontFamily: "var(--font-mono)", fontSize: 13, color: "var(--clay)", letterSpacing: "0.08em", marginBottom: 14 }}>PHASE 3 · DIGITAL SOIL ANALYSIS</div>
        }

        {/* status row: traffic-light scale */}
        <div style={{ background: "var(--surface)", borderRadius: flow.hybrid ? "4px 18px 18px 18px" : "var(--r-lg)", padding: 26, boxShadow: "var(--shadow-md)" }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: `var(--${st.tone})`, letterSpacing: "0.04em", marginBottom: 10 }}>▸ SOIL HEALTH STATUS</div>
          <p style={{ fontSize: 21, lineHeight: 1.5, color: "var(--ink)", fontWeight: 500 }}>
            {st.label} — among the{" "}
            <span style={{ background: `var(--${st.tone}-soft)`, color: `var(--${st.tone})`, fontWeight: 700, padding: "1px 7px", borderRadius: 6 }}>
              {f.acidityPercentile}% most acidic
            </span> plots in this zone.
          </p>
          <p style={{ fontSize: 17, lineHeight: 1.55, color: "var(--ink-2)", marginTop: 14 }}>
            Based on plot location and soil data, this soil would benefit from <strong style={{ color: "var(--leaf-deep)" }}>lime application</strong> to improve nutrient availability and fertilizer performance.
          </p>
        </div>
      </div>

}

function Toggle({ on, onClick }) {
  return (
    <button onClick={onClick} style={{ width: 50, height: 28, borderRadius: 999, border: "none", cursor: "pointer",
      background: on ? "var(--leaf)" : "var(--line-2)", position: "relative", transition: "background .2s", flex: "none" }}>
      <span style={{ position: "absolute", top: 3, left: on ? 25 : 3, width: 22, height: 22, borderRadius: 999, background: "white", transition: "left .2s", boxShadow: "var(--shadow-sm)" }} />
    </button>);

}

/* ============================================================
   Success overlay (after any confirm/sms/save)
   ============================================================ */
function SuccessScreen({ flow }) {
  const f = flow.farmer;
  const msg = {
    ordered: ["Order confirmed", `Added to ${f.name}'s SR2026 contract.`, "✅"],
    sms: ["Recommendation sent", `SMS dispatched to ${f.name} · ${f.phone}.`, "📱"],
    saved: ["Saved for later", "Will sync on the next morning sync.", "💾"]
  }[flow.placed];
  return (
    <div style={{ flex: 1, display: "grid", placeItems: "center", animation: "popIn .4s ease both" }}>
      <div style={{ textAlign: "center" }}>
        <div style={{ width: 100, height: 100, borderRadius: 999, background: "var(--leaf-soft)", display: "grid", placeItems: "center", fontSize: 48, margin: "0 auto 22px" }}>{msg[2]}</div>
        <h2 style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 38, color: "var(--ink)" }}>{msg[0]}</h2>
        <p style={{ fontSize: 18, color: "var(--ink-2)", marginTop: 8 }}>{msg[1]}</p>
        <div style={{ display: "flex", gap: 12, justifyContent: "center", marginTop: 28 }}>
          <Btn variant="ghost" onClick={() => flow.setPlaced(null)}><Arrow dir="left" /> Back to plan</Btn>
          <Btn variant="primary" onClick={() => flow.restart()}>New consultation</Btn>
        </div>
      </div>
    </div>);

}

/* ============================================================
   GuidedFlow — stepper, screen body, footer nav
   ============================================================ */
const GUIDED_SCREENS = [
ScreenSearch, // 0
ScreenConfirm, // 1
ScreenGoal, // 2
ScreenFert, // 3
ScreenSoilTest, // 4
ScreenPlan, // 5
ScreenBudget // 6
];
const NEXT_LABEL = ["Confirm farmer", "Set farming goal", "Enter fertilizer plan", "Generate recommendation", "View recommendation"];

function GuidedFlow({ flow }) {
  const { step, setStep } = flow;
  if (flow.placed) return <SuccessScreen flow={flow} />;

  const Screen = GUIDED_SCREENS[step];
  const showFooterNext = step <= 4 && step !== 1 && step !== 3;
  const nextDisabled =
  step === 2 && !flow.goal;

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", minHeight: 0 }}>
      {/* Stepper */}
      <div style={{ padding: "14px 40px", borderBottom: "1px solid var(--line)", background: "var(--paper-2)" }}>
        <Stepper steps={PHASES} current={STEP_PHASE[step]} />
      </div>

      {/* Body */}
      <div key={step} style={{ flex: 1, padding: "22px 40px", minHeight: 0, overflowY: "auto", overflowX: "hidden" }}>
        <Screen flow={flow} />
      </div>

      {/* Footer */}
      <div style={{ padding: "14px 40px", borderTop: "1px solid var(--line)", display: "flex", justifyContent: "space-between", alignItems: "center", background: "var(--paper-2)" }}>
        <Btn variant="ghost" onClick={() => setStep(step === 6 ? 5 : Math.max(0, step - 1))} disabled={step === 0}>
          <Arrow dir="left" /> Back
        </Btn>
        <div style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--ink-3)" }}>
          {step === 3 ?
          <span style={{ display: "flex", flexDirection: "column", alignItems: "center", lineHeight: 1.2 }}>
                <span style={{ letterSpacing: "0.06em" }}>PLANNED PURCHASE</span>
                <span style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 16, color: "var(--ink)" }}>{planTotalPacks(flow.farmerPlan)} {planTotalPacks(flow.farmerPlan) === 1 ? "pack" : "packs"}</span>
              </span> :
          step === 6 ? "BUDGET ASSISTANT" : `STEP ${step + 1} / 6`}
        </div>
        {showFooterNext ?
        <Btn variant="primary" onClick={() => setStep(step + 1)} disabled={nextDisabled}>{NEXT_LABEL[step]} <Arrow /></Btn> :
        <div style={{ width: 120 }} />}
      </div>
    </div>);

}

Object.assign(window, { ScreenPlan, ScreenBudget, SuccessScreen, GuidedFlow, Toggle });
  </script>

  <script type="text/babel">
/* ============================================================
   agronomy-chat.jsx — "Live Chat" alternative: TA texts a bot
   inside FieldPro. Same flow, conversational rendering.
   ============================================================ */
const { useState: cUseState, useEffect: cUseEffect, useRef: cUseRef } = React;

function ChatFlow({ flow }) {
  const [msgs, setMsgs] = cUseState([]);
  const [typing, setTyping] = cUseState(false);
  const [stage, setStage] = cUseState("plot"); // plot | goal | fert | order | done
  const [quick, setQuick] = cUseState([]);
  const scrollRef = cUseRef(null);
  const timers = cUseRef([]);

  const push = (m) => setMsgs((x) => [...x, m]);
  const after = (ms, fn) => { const id = setTimeout(fn, ms); timers.current.push(id); };

  // Auto-scroll
  cUseEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [msgs, typing, quick]);

  // Bot sequence helper: shows typing, then the message(s)
  const botSay = (items, done) => {
    setTyping(true);
    after(700, () => {
      setTyping(false);
      items.forEach((it) => push({ from: "bot", ...it }));
      done && done();
    });
  };

  // Boot the conversation
  cUseEffect(() => {
    botSay([
      { kind: "text", text: `${flow.swahili ? "Habari" : "Hello"}. Plot identified — ${flow.farmer.name}, ${flow.farmer.village} in ${flow.farmer.county}.` },
      { kind: "farmer" },
      { kind: "text", text: `We mapped this field last season at ${flow.farmer.acres} acres. Same plot today?` },
    ], () => setQuick([
      { label: `Yes — ${flow.farmer.acres} acres`, val: "yes" },
      { label: "Adjust size", val: "adjust" },
    ]));
    return () => timers.current.forEach(clearTimeout);
  }, []);

  const userSay = (text) => push({ from: "user", kind: "text", text });

  const handleQuick = (q) => {
    setQuick([]);
    if (stage === "plot") {
      userSay(q.val === "yes" ? `Confirmed, ${flow.acres} acres.` : "Let me adjust the size.");
      if (q.val === "adjust") {
        botSay([{ kind: "stepper" }], () => {});
      }
      botSay([{ kind: "text", text: "What's the primary goal for this plot in SR2026?" }], () => {
        setStage("goal");
        setQuick(GOALS.map((g) => ({ label: g.label, val: g.id })));
      });
    } else if (stage === "goal") {
      flow.setGoal(q.val);
      userSay(GOALS.find((g) => g.id === q.val).label);
      botSay([{ kind: "text", text: "Noted. Baseline plan uses DAP as the basal. Which top-dress fertilizer?" }], () => {
        setStage("fert");
        setQuick(FERTS.map((f) => ({ label: f.label, val: f.id })));
      });
    } else if (stage === "fert") {
      flow.setFert(q.val);
      userSay(`${q.val} for top-dress.`);
      // Run the soil test → insight → rec → ROI
      botSay([{ kind: "text", text: "Running Digital Soil Test using local climate & soil map…" }], () => {
        after(900, () => {
          botSay([{ kind: "gauge" }, { kind: "insight" }], () => {
            after(500, () => botSay([{ kind: "rec", fert: q.val }], () => {
              after(500, () => botSay([{ kind: "roi", fert: q.val }, { kind: "text", text: "Proceed to order?" }], () => {
                setStage("order");
                setQuick([
                  { label: "Confirm order", val: "confirm" },
                  { label: "SMS to farmer", val: "sms" },
                  { label: "Save for later", val: "save" },
                ]);
              }));
            }));
          });
        });
      });
    } else if (stage === "order") {
      const m = { confirm: "Confirm the order.", sms: "SMS the rec to the farmer.", save: "Save for later." }[q.val];
      userSay(m);
      const r = {
        confirm: `Done — added to ${flow.farmer.name}'s SR2026 contract.`,
        sms: `Recommendation sent by SMS to ${flow.farmer.name}.`,
        save: "Saved. It'll sync on the next morning sync.",
      }[q.val];
      botSay([{ kind: "text", text: r }], () => setStage("done"));
    }
  };

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", minHeight: 0, background: "var(--paper-2)" }}>
      {/* chat sub-header */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 28px", borderBottom: "1px solid var(--line)", background: "var(--surface)" }}>
        <BotAvatar />
        <div>
          <div style={{ fontWeight: 700, fontSize: 15, color: "var(--ink)" }}>FieldPro Agronomy Bot</div>
          <div style={{ fontSize: 12, color: "var(--good)", display: "flex", alignItems: "center", gap: 5 }}>
            <span style={{ width: 7, height: 7, borderRadius: 999, background: "var(--good)" }} /> online · cached for {flow.farmer.zone}
          </div>
        </div>
      </div>

      {/* messages */}
      <div ref={scrollRef} style={{ flex: 1, overflowY: "auto", padding: "22px 28px", display: "flex", flexDirection: "column", gap: 12 }}>
        {msgs.map((m, i) => <Bubble key={i} m={m} flow={flow} />)}
        {typing && <TypingDots />}
      </div>

      {/* quick replies + input */}
      <div style={{ borderTop: "1px solid var(--line)", background: "var(--surface)", padding: "12px 28px 16px" }}>
        {quick.length > 0 && (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 9, marginBottom: 12 }}>
            {quick.map((q) => (
              <button key={q.val} onClick={() => handleQuick(q)} style={chipStyle}>{q.label}</button>
            ))}
          </div>
        )}
        <div style={{ display: "flex", alignItems: "center", gap: 12, background: "var(--surface-2)", borderRadius: 999, padding: "10px 10px 10px 20px", border: "1.5px solid var(--line)" }}>
          <span style={{ flex: 1, fontSize: 15, color: "var(--ink-3)" }}>
            {stage === "done" ? "Consultation complete" : "Type a message to the bot…"}
          </span>
          <button style={{ width: 40, height: 40, borderRadius: 999, border: "none", background: "var(--leaf)", display: "grid", placeItems: "center", cursor: "pointer" }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 12h15M13 6l6 6-6 6" stroke="white" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
        </div>
      </div>
    </div>
  );
}

function BotAvatar() {
  return (
    <div style={{ width: 38, height: 38, borderRadius: 999, background: "var(--leaf-deep)", display: "grid", placeItems: "center", flex: "none", fontSize: 19 }}>🌿</div>
  );
}
function TypingDots() {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 9, alignSelf: "flex-start" }}>
      <BotAvatar />
      <div style={{ background: "var(--surface)", borderRadius: "4px 16px 16px 16px", padding: "14px 18px", boxShadow: "var(--shadow-sm)", display: "flex", gap: 5 }}>
        {[0,1,2].map((i) => <span key={i} style={{ width: 8, height: 8, borderRadius: 999, background: "var(--ink-3)", animation: `blink 1.2s ${i*0.18}s infinite` }} />)}
      </div>
    </div>
  );
}

const chipStyle = {
  background: "var(--surface)", color: "var(--leaf-deep)", border: "1.5px solid var(--leaf)",
  borderRadius: 999, padding: "9px 18px", fontSize: 14.5, fontWeight: 600, cursor: "pointer",
  fontFamily: "var(--font-body)", transition: "background .15s",
};

/* ---- A single chat bubble — text or rich card ---- */
function Bubble({ m, flow }) {
  if (m.from === "user") {
    return (
      <div style={{ alignSelf: "flex-end", maxWidth: "72%", background: "var(--leaf)", color: "oklch(0.99 0.01 90)",
        borderRadius: "16px 16px 4px 16px", padding: "11px 16px", fontSize: 15.5, lineHeight: 1.4, boxShadow: "var(--shadow-sm)", animation: "popIn .25s ease both" }}>
        {m.text}
      </div>
    );
  }
  // bot
  const wrap = (child, pad = true) => (
    <div style={{ display: "flex", gap: 9, alignSelf: "flex-start", maxWidth: m.kind === "text" ? "74%" : "88%", animation: "riseIn .3s ease both" }}>
      <BotAvatar />
      <div style={{ background: "var(--surface)", borderRadius: "4px 16px 16px 16px", padding: pad ? "12px 16px" : 0, boxShadow: "var(--shadow-sm)", overflow: "hidden" }}>
        {child}
      </div>
    </div>
  );

  if (m.kind === "text") return wrap(<span style={{ fontSize: 15.5, lineHeight: 1.45, color: "var(--ink)" }}>{m.text}</span>);

  if (m.kind === "farmer") return wrap(
    <div style={{ display: "flex", alignItems: "center", gap: 12, minWidth: 280 }}>
      <div style={{ width: 44, height: 44, borderRadius: 12, background: "var(--clay-soft)", color: "var(--clay)", display: "grid", placeItems: "center", fontWeight: 700, fontFamily: "var(--font-display)", fontSize: 18, flex: "none" }}>
        {flow.farmer.first[0]}{flow.farmer.name.split(" ")[1][0]}
      </div>
      <div>
        <div style={{ fontWeight: 700, fontSize: 15, color: "var(--ink)" }}>{flow.farmer.name}</div>
        <div style={{ fontSize: 12.5, color: "var(--ink-3)", fontFamily: "var(--font-mono)" }}>ID {flow.farmer.id} · {flow.farmer.zone}</div>
      </div>
    </div>, true);

  if (m.kind === "stepper") return wrap(
    <div style={{ minWidth: 220 }}>
      <div style={{ fontSize: 13, color: "var(--ink-3)", marginBottom: 8 }}>Field size</div>
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <button onClick={() => flow.setAcres(round1(Math.max(0.5, flow.acres - 0.5)))} style={miniStep}>–</button>
        <span style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 28, color: "var(--leaf-deep)", minWidth: 70, textAlign: "center" }}>{flow.acres} ac</span>
        <button onClick={() => flow.setAcres(round1(flow.acres + 0.5))} style={miniStep}>+</button>
      </div>
    </div>, true);

  if (m.kind === "gauge") return wrap(
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "8px 18px 14px", minWidth: 280 }}>
      <PhGauge value={flow.farmer.ph} projected={flow.farmer.phLimed} size={240} showProjected />
      <div style={{ marginTop: -8, textAlign: "center" }}>
        <span style={{ fontFamily: "var(--font-display)", fontWeight: 800, fontSize: 34, color: "var(--bad)" }}>{flow.farmer.ph} pH</span>
        <div style={{ marginTop: 6 }}><StatusBadge tone="bad">High acidity</StatusBadge></div>
      </div>
    </div>, false);

  if (m.kind === "insight") return wrap(
    <span style={{ fontSize: 15.5, lineHeight: 1.5, color: "var(--ink)" }}>
      Soil is <strong style={{ color: "var(--bad)" }}>high-acidity</strong> — among the {flow.farmer.acidityPercentile}% most acidic plots in this zone.
      Nutrients are locked. Recommend lime to unlock the soil before fertilizer.
    </span>);

  if (m.kind === "rec") {
    const plan = computePlan(flow.acres, m.fert);
    return wrap(
      <div style={{ minWidth: 320, padding: 4 }}>
        <div style={{ fontWeight: 700, fontSize: 14, color: "var(--clay)", marginBottom: 10, letterSpacing: "0.03em" }}>SR2026 NUTRITION PLAN · {flow.acres} ACRES</div>
        {[plan.foundation, plan.basal, ...plan.topdress].map((it) => (
          <div key={it.key} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderTop: "1px solid var(--line)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <Bag color="var(--leaf)" size={20} />
              <div>
                <div style={{ fontWeight: 700, fontSize: 15, color: "var(--ink)" }}>{it.name}</div>
                <div style={{ fontSize: 11.5, color: "var(--ink-3)" }}>{it.stage}</div>
              </div>
            </div>
            <span style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 19, color: "var(--ink)" }}>{it.bags} bags</span>
          </div>
        ))}
      </div>, true);
  }

  if (m.kind === "roi") {
    const plan = computePlan(flow.acres, m.fert);
    return wrap(
      <div style={{ minWidth: 320, padding: 4 }}>
        <div style={{ background: "linear-gradient(135deg, var(--leaf-deep), var(--leaf))", borderRadius: 12, padding: "14px 16px", color: "white", marginBottom: 12 }}>
          <div style={{ fontSize: 12.5, opacity: 0.9 }}>Extra profit vs blanket rec</div>
          <div style={{ fontFamily: "var(--font-display)", fontWeight: 800, fontSize: 28 }}>+{ksh(plan.profit)}</div>
        </div>
        {plan.items.map((it) => (
          <div key={it.key} style={{ display: "flex", justifyContent: "space-between", fontSize: 13.5, padding: "5px 0" }}>
            <span style={{ color: "var(--ink-2)" }}>{it.bags} × {it.name}</span>
            <span style={{ fontFamily: "var(--font-mono)", color: "var(--ink)" }}>{ksh(it.total)}</span>
          </div>
        ))}
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, paddingTop: 8, borderTop: "1.5px solid var(--line-2)" }}>
          <span style={{ fontWeight: 700, color: "var(--ink)" }}>Total</span>
          <span style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 18, color: "var(--leaf-deep)" }}>{ksh(plan.total)}</span>
        </div>
      </div>, true);
  }
  return null;
}
const miniStep = { width: 38, height: 38, borderRadius: 10, border: "1.5px solid var(--line-2)", background: "var(--surface-2)", color: "var(--ink)", fontSize: 22, cursor: "pointer", lineHeight: 1 };

Object.assign(window, { ChatFlow });

  </script>
