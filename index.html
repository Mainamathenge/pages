function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [step, setStep] = aUseState(0);
  const [farmer, setFarmer] = aUseState(RECENT[0]);
  const [acres, setAcres] = aUseState(RECENT[0].acres);
  const [goal, setGoal] = aUseState(null);
  const [farmerPlan, setFarmerPlan] = aUseState(emptyFarmerPlan());
  const [fert, setFert] = aUseState("CAN");
  const [placed, setPlaced] = aUseState(null);

  // Derive the top-dress profile from what the farmer plans to buy (by kg)
  const deriveFert = (p) => {
    const can = productKg(p.can), npk = productKg(p.npk);
    return (can > 0 && npk > 0) ? "Both" : (npk > 0 && can === 0) ? "NPK" : "CAN";
  };
  aUseEffect(() => { setFert(deriveFert(farmerPlan)); }, [farmerPlan]);

  const plan = aUseMemo(() => computePlan(acres, fert || "CAN"), [acres, fert]);
  const blanket = aUseMemo(() => computeBlanket(acres), [acres]);

  aUseEffect(() => {
    document.documentElement.classList.toggle("theme-dusk", t.theme === "dusk");
  }, [t.theme]);

  // hide boot splash once mounted
  aUseEffect(() => { const b = document.getElementById("boot"); if (b) b.style.display = "none"; }, []);

  const flow = {
    step, setStep, farmer, acres, setAcres, goal, setGoal, fert, setFert,
    farmerPlan,
    toggleProduct: (key) => setFarmerPlan((p) => {
      const turningOff = p[key].on;
      return { ...p, [key]: { ...p[key], on: !turningOff, sizes: turningOff ? {} : p[key].sizes } };
    }),
    setSizeQty: (key, kg, delta) => setFarmerPlan((p) => {
      const sizes = { ...p[key].sizes };
      const next = clamp((sizes[String(kg)] || 0) + delta, 0, 50);
      if (next === 0) delete sizes[String(kg)]; else sizes[String(kg)] = next;
      return { ...p, [key]: { ...p[key], sizes } };
    }),
    toggleSize: (key, kg) => setFarmerPlan((p) => {
      const sizes = { ...p[key].sizes };
      if (sizes[String(kg)]) delete sizes[String(kg)]; else sizes[String(kg)] = 1;
      return { ...p, [key]: { ...p[key], sizes } };
    }),
    plan, blanket, placed, setPlaced,
    hybrid: t.mode === "hybrid", swahili: t.swahili,
    selectFarmer: (f) => { setFarmer(f); setAcres(f.acres); },
    place: (kind) => setPlaced(kind),
    restart: () => { setPlaced(null); setStep(0); setGoal(null); setFarmerPlan(emptyFarmerPlan()); },
  };

  const Mode = t.mode === "chat" ? ChatFlow : GuidedFlow;

  return (
    <div style={{ width: "100%", height: "100%", display: "flex", flexDirection: "column", background: "var(--paper)" }}>
      <TopBar t={t} farmer={farmer} />
      <Mode key={t.mode} flow={flow} />

      <TweaksPanel>
        <TweakSection label="Interface style" />
        <TweakRadio label="Mode" value={t.mode}
          options={["guided", "chat", "hybrid"]}
          onChange={(v) => setTweak("mode", v)} />
        <div style={{ fontSize: 11.5, color: "var(--ink-3, #999)", padding: "2px 2px 6px", lineHeight: 1.4 }}>
          Guided stepper · Live chat bot · Hybrid (chat insight inside the guided flow)
        </div>

        <TweakSection label="Field context" />
        <TweakToggle label="Offline / sync indicator" value={t.offlineCue}
          onChange={(v) => setTweak("offlineCue", v)} />
        <TweakToggle label="Swahili touches" value={t.swahili}
          onChange={(v) => setTweak("swahili", v)} />

        <TweakSection label="Theme" />
        <TweakRadio label="Surface" value={t.theme}
          options={["paper", "dusk"]}
          onChange={(v) => setTweak("theme", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>

  <script>
    (function () {
      var BASE_W = 1194, BASE_H = 834;
      function fit() {
        var pad = Math.max(8, Math.min(40, window.innerWidth * 0.04));
        var s = Math.min((window.innerWidth - pad) / BASE_W, (window.innerHeight - pad) / BASE_H);
        document.getElementById('scaler').style.transform = 'scale(' + s + ')';
      }
      window.addEventListener('resize', fit);
      window.addEventListener('orientationchange', fit);
      fit();
    })();
  </script>
</body>
</html>
